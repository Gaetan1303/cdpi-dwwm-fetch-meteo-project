<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Météo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Météo</h1>

    <!-- Autocomplétion ville -->
    <form id="searchForm" autocomplete="off">
      <input id="cityInput" type="text" placeholder="Nom d’une ville…" required list="cityList" />
      <datalist id="cityList"></datalist>
      <button type="submit">🔍</button>
    </form>

    <!-- Lat / Lon -->
    <form id="latLonForm" autocomplete="off" class="lat-lon-form">
      <input id="latInput" type="number" step="any" placeholder="Latitude"  required />
      <input id="lonInput" type="number" step="any" placeholder="Longitude" required />
      <button type="submit">🔍</button>
    </form>

    <!-- Choix multiple éventuel -->
    <div id="choiceBox" class="hidden"></div>

    <section id="weather" class="hidden">
      <p id="cityName"></p>
      <img id="weatherIcon" src="" alt="icone temps" />
      <p id="temperature"></p>
      <p id="description"></p>
    </section>

    <button id="geoBtn" class="geo-btn">📍 Ma position</button>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
